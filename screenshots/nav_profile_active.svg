<svg xmlns="http://www.w3.org/2000/svg" width="520" height="180" viewBox="0 0 520 180">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="orange-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feFlood flood-color="#FF6B35"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="20" y="30" width="480" height="120" rx="60" ry="60" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- HOME icon (inactive, gray) -->
  <g transform="translate(96, 60)" fill="none" stroke="#6B7280" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 22l24-22 24 22v24a4 4 0 0 1-4 4h-10v-18h-16v18H10a4 4 0 0 1-4-4Z" transform="scale(1.05)"/>
  </g>

  <!-- CLOCK icon (inactive, gray) -->
  <g transform="translate(232, 62)" fill="none" stroke="#6B7280" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="28" cy="28" r="22"/>
    <polyline points="28 14 28 28 38 33"/>
  </g>

  <!-- PERSON icon (ACTIVE — orange circle, white glyph) at x=400 -->
  <g filter="url(#orange-shadow)">
    <circle cx="400" cy="90" r="46" fill="#FF6B35"/>
  </g>
  <g transform="translate(372, 58)" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="28" cy="22" r="12"/>
    <path d="M4 60c0-12 12-20 24-20s24 8 24 20"/>
  </g>
</svg>
